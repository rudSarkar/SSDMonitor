name: Release

# Trigger: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14   # Apple Silicon (M1) runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (Release)
        run: |
          xcodebuild \
            -project SSDMonitor.xcodeproj \
            -scheme SSDMonitor \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/build" \
            build

      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - \
            "$RUNNER_TEMP/build/Build/Products/Release/SSDMonitor.app"

      - name: Create DMG
        run: |
          APP="$RUNNER_TEMP/build/Build/Products/Release/SSDMonitor.app"
          STAGING="$RUNNER_TEMP/dmg_staging"
          TAG="${{ github.ref_name }}"
          DMG="$RUNNER_TEMP/SSDMonitor-${TAG}.dmg"

          mkdir "$STAGING"
          cp -r "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          # Strip quarantine so users get no Gatekeeper prompt when dragging to /Applications
          xattr -cr "$STAGING/SSDMonitor.app"

          hdiutil create \
            -volname "SSDMonitor ${TAG}" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG"

          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SSDMonitor ${{ github.ref_name }}"
          files: ${{ env.DMG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
